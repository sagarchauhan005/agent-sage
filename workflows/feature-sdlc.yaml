# Sage SDLC — feature workflow
# Parent: ../Agents.md
#
# Terminology:
#   Orchestrator (sage-orchestrator) — owns the pipeline end to end
#   Engineer (sage-engineer)         — implements full-stack (scope per plan/profile)

name: sage-feature-sdlc
version: 5

run_dir: runs/{run_id}
manifest: runs/{run_id}/manifest.json
handoff_dir: runs/{run_id}/handoffs

profiles:
  web-product:
    description: Web product feature — full SDLC; engineer builds UI + API
    default_route_after_plan: design
    phases: [plan, design, architect, build, qa, devops, release]
    skipped_phases: []
    qa_requires: [build]
    qa_next: devops
    qa_handoff: qa-to-devops.md

  library-backend:
    description: Backend library or module — no UI, no deploy phase
    default_route_after_plan: architect
    architect_optional: true
    phases: [plan, architect, build, qa, release]
    skipped_phases: [design, devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  backend-api:
    description: API or backend service — deploy packaging, no UI design phase
    default_route_after_plan: architect
    phases: [plan, architect, build, qa, devops, release]
    skipped_phases: [design]
    qa_requires: [build]
    qa_next: devops
    qa_handoff: qa-to-devops.md

  ui-feature:
    description: Frontend-heavy feature — design + build, no devops
    default_route_after_plan: design
    phases: [plan, design, architect, build, qa, release]
    skipped_phases: [devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  hotfix:
    description: One-line fix, config tweak, typo, dependency patch
    default_route_after_plan: build
    phases: [plan, build, qa, release]
    skipped_phases: [design, architect, devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  spike:
    description: Time-boxed prototype — throwaway scope; same path as hotfix
    default_route_after_plan: build
    phases: [plan, build, qa, release]
    skipped_phases: [design, architect, devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  backend-module:
    description: Shared lib/package with arch doc, no Docker/deploy
    default_route_after_plan: architect
    phases: [plan, architect, build, qa, release]
    skipped_phases: [design, devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  ui-deploy:
    description: New UI surface needing CDN/Docker — no formal architecture doc
    default_route_after_plan: design
    phases: [plan, design, build, qa, devops, release]
    skipped_phases: [architect]
    qa_requires: [build]
    qa_next: devops
    qa_handoff: qa-to-devops.md

  full-stack-no-deploy:
    description: Full feature on branch/PR only — hosting unchanged
    default_route_after_plan: design
    phases: [plan, design, architect, build, qa, release]
    skipped_phases: [devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

  api-hotfix:
    description: Production API fix with deploy — skip design and architect
    default_route_after_plan: build
    phases: [plan, build, qa, devops, release]
    skipped_phases: [design, architect]
    qa_requires: [build]
    qa_next: devops
    qa_handoff: qa-to-devops.md

  design-led:
    description: UI-heavy change with formal API contract in architecture doc
    default_route_after_plan: design
    phases: [plan, design, architect, build, qa, release]
    skipped_phases: [devops]
    qa_requires: [build]
    qa_next: release
    qa_handoff: qa-to-release.md

phases:
  - id: plan
    order: 1
    agent: sage-planner
    command: sage-plan
    artifact: plan.md
    plan_mode: required
    local_plan_path: runs/{run_id}/plan.md
    handoff_options:
      - plan-to-design.md
      - plan-to-architect.md
      - plan-to-build.md
    next_options:
      - design
      - architect
      - build
    skippable: false

  - id: design
    order: 2
    agent: sage-designer
    command: sage-design
    artifact: design.md
    handoff: design-to-architect.md
    handoff_options:
      - design-to-architect.md
      - design-to-build.md
    next: architect
    next_options:
      - architect
      - build
    requires: [plan]
    skippable: true

  - id: architect
    order: 3
    agent: sage-architect
    command: sage-architect
    artifact: architecture.md
    handoff: architect-to-build.md
    next: build
    requires: [plan]
    optional: [design]
    skippable: true

  - id: build
    order: 4
    agent: sage-engineer
    command: sage-engineer
    artifact: build.md
    handoff: build-to-qa.md
    next: qa
    requires: [plan]
    optional: [design, architect]
    skippable: false

  - id: qa
    order: 5
    agent: sage-qa
    command: sage-qa
    artifact: test-report.md
    handoff_options:
      - qa-to-devops.md
      - qa-to-release.md
    next_options:
      - devops
      - release
    skippable: false

  - id: devops
    order: 6
    agent: sage-devops
    command: sage-devops
    artifact: deploy-report.md
    handoff: devops-to-release.md
    next: release
    requires: [qa]
    skippable: true

  - id: release
    order: 7
    agent: sage-release
    command: sage-release
    artifact: release-report.md
    handoff: release-complete.md
    next: done
    gates: [push, pr]
    skippable: false

gates:
  push:
    description: User must approve before git push
    default: pending_user
  pr:
    description: User must approve before PR creation
    default: pending_user
  deploy:
    description: User must approve before deploy
    default: pending_user

on_failure:
  action: loop_to_phase
  notify: user
